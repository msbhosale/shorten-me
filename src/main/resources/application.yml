server:
  port: 8085

app:
  short-url:
    base-url: http://localhost:8085/

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

spring:
  application:
    name: shorten-me
  datasource:
    url: jdbc:mysql://localhost:3306/url_shortener
    username: root
    password: root1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  spring:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update # use create only in dev
    show-sql: false
    properties:
      hibernate:
        format_sql: true
